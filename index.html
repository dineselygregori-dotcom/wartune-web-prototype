<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartune Ultra Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div class="player-brief">
                <img id="hud-avatar" src="https://images.unsplash.com/photo-1598974542562-38d5f30689b9?auto=format&fit=crop&w=50&q=80" alt="Avatar">
                <div>
                    <span id="hud-name">Hero</span> <span id="hud-lvl" style="color:#00d2ff;">Lv.1</span><br>
                    <span style="color:#ffcc00; font-size:0.8rem;">BR: <span id="hud-br">1500</span></span>
                </div>
            </div>
            <div class="resources">
                <span style="color: #ffcc00;">Gold: <span id="gold-display">0</span></span>
                <span style="color: #ff00ff;">Balens: <span id="balen-display">0</span></span>
                <button onclick="rechargeBalens()" class="btn-sm">Recharge</button>
            </div>
        </div>

        <div class="main-view">
            <div class="arena-view" id="arena-view">
                <div class="entity player-entity">
                    <img id="player-sprite" src="https://images.unsplash.com/photo-1598974542562-38d5f30689b9?auto=format&fit=crop&w=200&q=80" class="sprite player-glow">
                    <div class="hp-bar-bg"><div id="player-hp-bar" class="hp-bar-fill fill-green"></div></div>
                </div>
                
                <div class="entity enemy-entity">
                    <img id="enemy-sprite" src="https://images.unsplash.com/photo-1580226929947-f0b83e3518a4?auto=format&fit=crop&w=200&q=80" class="sprite enemy-glow">
                    <div class="hp-bar-bg"><div id="enemy-hp-bar" class="hp-bar-fill fill-red"></div></div>
                </div>

                <div class="combat-ui">
                    <div id="battle-log" class="battle-log">Awaiting battle...</div>
                    <div class="skill-bar">
                        <button id="basic-atk-btn" onclick="useSkill('basic')">Attack</button>
                        <button id="special-atk-btn" onclick="startQTE()">Special Skill</button>
                        <button id="reset-battle-btn" style="display:none;" onclick="resetBattle()">Next Enemy</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-menu">
            <button onclick="toggleModal('modal-char')">Character</button>
            <button onclick="toggleModal('modal-bag')">Backpack</button>
            <button onclick="toggleModal('modal-shop')">Shop</button>
        </div>

        <div id="modal-char" class="modal">
            <div class="modal-header">Character & Equipment <button onclick="toggleModal('modal-char')">X</button></div>
            <div class="modal-body char-grid">
                <div class="equip-col">
                    <div class="equip-slot" id="eq-weapon" onclick="unequipItem('weapon')">Weapon</div>
                    <div class="equip-slot" id="eq-armor" onclick="unequipItem('armor')">Armor</div>
                    <div class="equip-slot" id="eq-hat" onclick="unequipItem('hat')">Hat</div>
                </div>
                <div class="char-center">
                    <img id="char-model" src="https://images.unsplash.com/photo-1598974542562-38d5f30689b9?auto=format&fit=crop&w=200&q=80">
                    <div class="stats-box">
                        <p>HP: <span id="stat-hp">0</span></p>
                        <p>ATK: <span id="stat-atk">0</span></p>
                        <p>DEF: <span id="stat-def">0</span></p>
                    </div>
                </div>
                <div class="equip-col">
                    <div class="equip-slot" id="eq-wings" onclick="unequipItem('wings')">Wings</div>
                    <div class="equip-slot" id="eq-ring" onclick="unequipItem('ring')">Ring</div>
                    <div class="equip-slot" id="eq-amulet" onclick="unequipItem('amulet')">Amulet</div>
                </div>
            </div>
        </div>

        <div id="modal-bag" class="modal">
            <div class="modal-header">Backpack <button onclick="toggleModal('modal-bag')">X</button></div>
            <div class="modal-body">
                <div class="bag-grid" id="bag-grid">
                    </div>
            </div>
        </div>

        <div id="modal-shop" class="modal">
            <div class="modal-header">Marketplace & Mounts <button onclick="toggleModal('modal-shop')">X</button></div>
            <div class="modal-body shop-grid" id="shop-grid">
                </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
